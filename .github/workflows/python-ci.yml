name: Python CI

on:
  pull_request:
    paths:
      - "core/**"
      - "retrieval/**"
      - "ingestion/**"
      - "dashboard/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-ci.yml"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run tests
        # Quality tests are excluded by default via pyproject.toml addopts ("-m 'not quality'")
        # Integration tests use fully mocked dependencies — no real API keys needed
        run: uv run pytest tests/unit tests/integration -v
